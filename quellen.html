<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quellenverzeichnis - Medienkompetenz & Desinformation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { accent: { light: '#3b82f6', dark: '#8b5cf6' } }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-sans antialiased bg-slate-50 text-slate-900 dark:bg-gray-950 dark:text-gray-100 transition-all duration-500 ease-in-out; }
            *, ::before, ::after { @apply transition-all duration-500 ease-in-out; }
        }
    </style>
</head>
<body>
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-slate-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <img src="/logo.png" alt="Logo" class="w-10 h-10 object-contain hover:scale-110 transition-transform cursor-pointer" referrerPolicy="no-referrer">
                <span class="font-bold text-lg tracking-tight hidden sm:block">Seminarfach A27</span>
            </a>
            <button id="theme-toggle" class="p-2 rounded-xl bg-slate-100 dark:bg-gray-800 hover:ring-2 ring-accent-light dark:ring-accent-dark transition-all">
                <svg id="sun-icon" class="w-5 h-5 text-amber-500 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-700 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            </button>
        </div>
    </header>

    <main class="pt-32 pb-20 relative">
        <div class="fixed inset-0 -z-20 pointer-events-none overflow-hidden">
            <div class="absolute top-[10%] -left-[10%] w-[40%] h-[40%] bg-accent-light/5 blur-[120px] rounded-full animate-[pulse_8s_infinite]"></div>
            <div class="absolute bottom-[10%] right-[10%] w-[30%] h-[30%] bg-accent-dark/5 blur-[100px] rounded-full animate-[pulse_10s_infinite_4s]"></div>
        </div>

        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-4xl font-black mb-8">Quellenverzeichnis</h1>
            <div class="prose prose-slate dark:prose-invert max-w-none space-y-6 text-slate-600 dark:text-gray-400">
                <section>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-4">Verwendete Quellen</h2>
                    <ul class="list-disc pl-5 space-y-2">
                        <li>
                            <span class="font-semibold">Beispielquelle:</span> 
                            Mustermann, M. (2024). 
                            <span class="italic">Medienkompetenz im digitalen Zeitalter</span>. 
                            Musterverlag, Berlin. 
                            <a href="#" class="text-accent-light dark:text-accent-dark hover:underline">Link zur Quelle</a>
                        </li>
                    </ul>
                </section>
            </div>
        </div>
    </main>

    <footer class="py-16 bg-white/30 dark:bg-gray-900/30 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-3">
                <img src="/logo.png" alt="Logo" class="w-8 h-8 object-contain" referrerPolicy="no-referrer">
                <span class="font-bold text-slate-900 dark:text-white">Seminarfach A27</span>
            </div>
            <nav class="flex flex-wrap justify-center gap-x-8 gap-y-4 text-sm font-medium text-slate-600 dark:text-gray-400">
                <a href="impressum.html" class="hover:text-accent-light dark:hover:text-accent-dark transition-colors">Impressum</a>
                <a href="datenschutz.html" class="hover:text-accent-light dark:hover:text-accent-dark transition-colors">Datenschutz</a>
                <a href="quellen.html" class="hover:text-accent-light dark:hover:text-accent-dark transition-colors">Quellen</a>
                <a href="kontakt.html" class="hover:text-accent-light dark:hover:text-accent-dark transition-colors">Kontakt</a>
            </nav>
            <p class="text-slate-500 dark:text-gray-500 text-sm">&copy; 2026 Seminarfach Gruppe 1 A27</p>
        </div>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        themeToggle.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
